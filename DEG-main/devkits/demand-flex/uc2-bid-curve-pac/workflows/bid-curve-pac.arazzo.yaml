arazzo: 1.0.1
info:
  title: Bid Curve Pay-As-Clear Demand Flex Workflow
  version: 1.0.0
  description: >
    End-to-end Beckn 2.0 workflow for bid-curve-based, pay-as-clear demand response.

    Scenario: TPDDL (utility) publishes a 200 kW curtailment event for Jun 15 7-9pm
    IST, specifying PAY-AS-CLEAR clearing at 5:30pm IST. GreenFlex (aggregator)
    discovers the event, then at confirm submits a step bid curve per hour:
    parallel BID_PRICE + BID_POWER arrays in commitmentAttributes, where index i
    pairs (BID_PRICE[i], BID_POWER[i]) = one step on the offer curve.

    TPDDL aggregates all aggregator bids, runs the PAC clearing at 5:30pm, and
    returns the clearing result in on_confirm by extending commitmentAttributes
    with two new payloads: CLEARED_POWER and CLEARING_PRICE (insertedBy: buyer).
    The bid curve is preserved alongside the clearing result for a full audit trail.

    Post-event: TPDDL publishes pre-event baselines (5-of-10), then measured
    actuals. Settlement is computed by the demand_flex_pac_revenue.rego policy
    from baseline, actuals, and cleared allocation. Revenue = delivered flex
    (capped at CLEARED_POWER per interval) × CLEARING_PRICE.

    Numbers:
      Cleared at 3.5 INR/kWh — meter/001 + meter/002
      Interval 0 (7-8pm): CLEARED=50 kW, delivered=50 kW → 175 INR
      Interval 1 (8-9pm): CLEARED=45 kW, delivered=45 kW → 157.5 INR
      Total settlement: 332.5 INR payable to GreenFlex

    Run with Redocly respect (from demand-flex/):

      Run all workflows:
        npx @redocly/cli respect uc2-bid-curve-pac/workflows/bid-curve-pac.arazzo.yaml \
          --severity 'SCHEMA_CHECK=off' -v

      Run a single workflow:
        npx @redocly/cli respect uc2-bid-curve-pac/workflows/bid-curve-pac.arazzo.yaml \
          -w select-through-settlement --severity 'SCHEMA_CHECK=off' -v

      Available workflows: publish-catalog, discover, select-through-settlement

      Override server URLs (optional, defaults in x-serverUrl):
        -S beckn-bap-caller=http://localhost:8081/bap/caller \
        -S beckn-bpp-caller=http://localhost:8082/bpp/caller

sourceDescriptions:
  - name: beckn-bap-caller
    type: openapi
    url: https://raw.githubusercontent.com/beckn/protocol-specifications-v2/refs/tags/core-v2.0.0-lts/api/v2.0.0/beckn.yaml
    x-serverUrl: http://localhost:8081/bap/caller

  - name: beckn-bpp-caller
    type: openapi
    url: https://raw.githubusercontent.com/beckn/protocol-specifications-v2/refs/tags/core-v2.0.0-lts/api/v2.0.0/beckn.yaml
    x-serverUrl: http://localhost:8082/bpp/caller

workflows:
  # ── Catalog & Discovery ──

  - workflowId: publish-catalog
    summary: Utility publishes PAC auction event with clearingMethod and clearingTime
    steps:
      - stepId: publish-catalog
        description: >
          BPP publishes DemandFlexNeed (200 kW curtailment, Jun 15 7-9pm IST) with
          a DemandFlexBuyOffer specifying PAY-AS-CLEAR clearing at 5:30pm IST.
          No fixed incentive rate — price is discovered via auction.
        operationId: beckn-bpp-caller.catalogPublish
        requestBody:
          contentType: application/json
          payload:
            $ref: "../examples/publish-catalog.json"

  - workflowId: discover
    summary: Aggregator discovers available curtailment flex events
    steps:
      - stepId: discover
        description: BAP discovers CURTAILMENT + REDUCE resources on the network
        operationId: beckn-bap-caller.discover
        requestBody:
          contentType: application/json
          payload:
            $ref: "../examples/discover-request.json"

  # ── Contract Lifecycle: select → confirm (bid) → on_confirm (clearing) → actuals → settlement ──

  - workflowId: select-through-settlement
    summary: Aggregator selects, submits bid curve, receives clearing result, delivers, settles
    # on_select / on_init are generated by sandbox-bpp from responses/bpp/on_{select,init}.json.
    # on_confirm is the key new step: sandbox returns responses/bpp/on_confirm.json, which
    # extends commitmentAttributes with CLEARED_POWER + CLEARING_PRICE (insertedBy: buyer),
    # telling the aggregator how much they are cleared to flex at what price.
    steps:
      - stepId: select
        description: >
          Aggregator selects the PAC offer, expressing intent to bid up to 90 kW
          (the maximum quantity in the bid curve's first price step).
        operationId: beckn-bap-caller.select
        requestBody:
          contentType: application/json
          payload:
            $ref: "../examples/select-request.json"

      - stepId: init
        description: Aggregator provides identity and enrolls 2 participating meters
        operationId: beckn-bap-caller.init
        requestBody:
          contentType: application/json
          payload:
            $ref: "../examples/init-request.json"

      - stepId: confirm
        description: >
          Aggregator submits final bid curve in commitmentAttributes.
          Two 1-hour intervals, each with parallel BID_PRICE + BID_POWER arrays
          (4 steps per interval). BPP runs PAC clearing after this call.
          Sandbox returns on_confirm (responses/bpp/on_confirm.json) with
          CLEARED_POWER and CLEARING_PRICE added to commitmentAttributes.
        operationId: beckn-bap-caller.confirm
        requestBody:
          contentType: application/json
          payload:
            $ref: "../examples/confirm-request.json"

      - stepId: on-status-baselines
        description: >
          Utility publishes pre-event baselines (5-of-10 methodology) for each
          participating meter, 30 minutes before the event window.
        operationId: beckn-bpp-caller.onStatus
        requestBody:
          contentType: application/json
          payload:
            $ref: "../examples/on-status-response-baselines.json"

      - stepId: on-status-actuals
        description: >
          Utility publishes measured actuals (BASELINE + USAGE per interval per
          meter) after the event window closes. Delivered flex:
          meter/001 interval 0 = 25 kW, interval 1 = 22.5 kW;
          meter/002 interval 0 = 25 kW, interval 1 = 22.5 kW.
          Aggregate matches cleared allocation exactly (50 kW, 45 kW).
        operationId: beckn-bpp-caller.onStatus
        requestBody:
          contentType: application/json
          payload:
            $ref: "../examples/on-status-response-actuals.json"

      - stepId: on-status-settled
        description: >
          Utility triggers settlement policy evaluation.
          Revenue = delivered flex × clearing price:
          (50 kWh + 45 kWh) × 3.5 INR/kWh = 332.5 INR payable to GreenFlex.
          Revenue flows are appended to contract.consideration by the
          revenueflows middleware after policy evaluation.
        operationId: beckn-bpp-caller.onStatus
        requestBody:
          contentType: application/json
          payload:
            $ref: "../examples/on-status-response-settled.json"
