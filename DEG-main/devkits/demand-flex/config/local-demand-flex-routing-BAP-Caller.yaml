# BAP Caller routing: outbound requests from BAP → BPP adapter
routingRules:
  - version: "2.0.0"
    targetType: "bpp"
    endpoints:
      - select
      - init
      - confirm
      - status
      - track
      - cancel
      - update
      - rating
      - support

  - version: "2.0.0"
    targetType: "url"
    target:
      url: "https://34.93.165.42.sslip.io/beckn" # Replace with your Discover service endpoint
    endpoints:
      - discover

  - version: "2.0.0"
    targetType: "url"
    target:
      url: "https://fabric.nfh.global/beckn/catalog/subscription"
      excludeAction: true
    endpoints:
      - subscribe
