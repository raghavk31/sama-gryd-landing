arazzo: 1.0.1
info:
  title: Demand Flex Workflow
  version: 1.0.0
  description: >
    End-to-end Beckn 2.0 workflow for behavioral demand response.
    Scenario: TPDDL (utility) publishes a 500 kW curtailment need,
    GreenFlex (aggregator) discovers, commits, and delivers demand
    flexibility, followed by baseline/actuals/resource-telemetry/settlement.

    Settlement is computed against GRID-METER baselines and actuals
    (the DISCOM's own measured truth). Per-EnergyResource BecknTimeSeries
    (USAGE/POWER/SOC_END per interval, GPS once per event) is
    delivered as an additional on_status push between actuals and
    settled — it is a reconciliation channel only, never read by the
    revenue rego, useful only for explaining anomalies after the
    fact. BASELINE is exclusively utility-provided and is absent from
    EnergyResource telemetry.

    Run with Redocly respect (from demand-flex/):

      Run all workflows:
        npx @redocly/cli respect workflows/demand-flex.arazzo.yaml \
          --severity 'SCHEMA_CHECK=off' -v

      Run a single workflow:
        npx @redocly/cli respect workflows/demand-flex.arazzo.yaml \
          -w select-through-settlement --severity 'SCHEMA_CHECK=off' -v

      Available workflows: publish-catalog, discover,
        select-through-settlement, demand-flex-update

      Override server URLs (optional, defaults in x-serverUrl):
        -S beckn-bap-caller=http://localhost:8081/bap/caller \
        -S beckn-bpp-caller=http://localhost:8082/bpp/caller

sourceDescriptions:
  - name: beckn-bap-caller
    type: openapi
    url: https://raw.githubusercontent.com/beckn/protocol-specifications-v2/refs/tags/core-v2.0.0-lts/api/v2.0.0/beckn.yaml
    x-serverUrl: http://localhost:8081/bap/caller

  - name: beckn-bpp-caller
    type: openapi
    url: https://raw.githubusercontent.com/beckn/protocol-specifications-v2/refs/tags/core-v2.0.0-lts/api/v2.0.0/beckn.yaml
    x-serverUrl: http://localhost:8082/bpp/caller

workflows:
  # ── Catalog & Discovery ──

  - workflowId: publish-catalog
    summary: Utility publishes demand flex catalog with curtailment needs and incentive offers
    steps:
      - stepId: publish-catalog
        description: BPP publishes DemandFlexNeed + DemandFlexBuyOffer catalog
        operationId: beckn-bpp-caller.catalogPublish
        requestBody:
          contentType: application/json
          payload:
            $ref: "../examples/publish-catalog.json"

  - workflowId: discover
    summary: Aggregator discovers available flex opportunities via discover service
    steps:
      - stepId: discover
        description: BAP discovers CURTAILMENT + REDUCE offers on the network
        operationId: beckn-bap-caller.discover
        requestBody:
          contentType: application/json
          payload:
            $ref: "../examples/discover-request.json"

  # ── Contract Lifecycle: select → confirm → baselines → actuals → settlement ──

  - workflowId: select-through-settlement
    summary: Aggregator selects, negotiates, confirms, and receives settlement
    # on_select / on_init / on_confirm are NOT posted directly here — they are
    # generated by sandbox-bpp from ../responses/bpp/on_{select,init,confirm}.json
    # in response to each BAP→BPP request. The arazzo's success therefore also
    # proves that the sandbox-produced callbacks pass schema validation at both
    # the BPP caller and the BAP receiver (see post-run check in run-arazzo-lib.sh).
    steps:
      - stepId: select
        description: Aggregator selects 150 kW of the 500 kW curtailment offer
        operationId: beckn-bap-caller.select
        requestBody:
          contentType: application/json
          payload:
            $ref: "../examples/select-request.json"

      - stepId: init
        description: Aggregator provides identity and 2 participating meters
        operationId: beckn-bap-caller.init
        requestBody:
          contentType: application/json
          payload:
            $ref: "../examples/init-request.json"

      - stepId: confirm
        description: Aggregator confirms the demand flex contract (ACTIVE)
        operationId: beckn-bap-caller.confirm
        requestBody:
          contentType: application/json
          payload:
            $ref: "../examples/confirm-request.json"

      - stepId: on-status-baselines
        description: >
          Utility publishes baseline values per meter (pre-event).
          Uses bestOf5outOf10 methodology.
        operationId: beckn-bpp-caller.onStatus
        requestBody:
          contentType: application/json
          payload:
            $ref: "../examples/on-status-response-baselines.json"

      - stepId: on-status-actuals
        description: >
          Utility publishes measured actuals (post-event).
          Compares actual consumption against baselines.
        operationId: beckn-bpp-caller.onStatus
        requestBody:
          contentType: application/json
          payload:
            $ref: "../examples/on-status-response-actuals.json"

      - stepId: on-status-resource-telemetry
        description: >
          Utility publishes per-EnergyResource BecknTimeSeries it has
          aggregated out-of-band (via the aggregator's vendor-API
          integrations) — PER_INTERVAL (USAGE/POWER/SOC_END) on
          every interval, PER_EVENT (GPS_LAT/GPS_LON) only on
          interval 0. BASELINE is exclusively utility-provided and
          is absent from EnergyResource telemetry. Reconciliation
          channel only; the settlement rego does not read this
          payload.
        operationId: beckn-bpp-caller.onStatus
        requestBody:
          contentType: application/json
          payload:
            $ref: "../examples/on-status-response-resource-telemetry.json"

      - stepId: on-status-settled
        description: >
          Utility computes settlement based on policy evaluation.
          Revenue flows: 150 kWh x 3.5 INR/kWh = 525 INR payable to aggregator.
        operationId: beckn-bpp-caller.onStatus
        requestBody:
          contentType: application/json
          payload:
            $ref: "../examples/on-status-response-settled.json"

  # ── Update: opt-in additional meters ──

  - workflowId: demand-flex-update
    summary: Aggregator updates participating meters and capacity
    steps:
      - stepId: update
        description: Aggregator opts in meter 003, adjusts commitment to 120 kW
        operationId: beckn-bap-caller.update
        requestBody:
          contentType: application/json
          payload:
            $ref: "../examples/update-request-opt-in.json"
