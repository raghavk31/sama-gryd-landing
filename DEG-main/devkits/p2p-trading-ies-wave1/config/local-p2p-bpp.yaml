appName: "onix-local"
log:
  level: debug
  destinations:
    - type: stdout
  contextKeys:
    - transaction_id
    - message_id
    - subscriber_id
    - module_id
http:
  port: 8082
  timeout:
    read: 30
    write: 30
    idle: 30
pluginManager:
  root: ./plugins
modules:
  - name: bppTxnReceiver
    path: /bpp/receiver/
    handler:
      type: std
      role: bpp
      httpClientConfig:
        maxIdleConns: 1000
        maxIdleConnsPerHost: 200
        idleConnTimeout: 300s
        responseHeaderTimeout: 5s
      plugins:
        registry:
          id: dediregistry
          config:
            url: https://api.dev.beckn.io/registry/dedi
            registryName: subscribers.beckn.one
            allowedParentNamespaces: "IES,IES-DISCOMS"
            timeout: 10
        keyManager:
          id: simplekeymanager
          config:
            networkParticipant: p2p-trading-sandbox2.com
            keyId: 76EU7Mvhh7jaEf7Lcac5R1PPeFL4ddr1ALs2QYzpyTRE8g15Yr1p7C
            signingPrivateKey: AC72WfPu5ly3T7rXfRHrLA/l++BxbsNwe0qitgT9u6U=
            signingPublicKey: E9w4QejjJ6d+VODJlDKJcpI93RY3Bg4RQp4Rs1F9oQ8=
            encrPrivateKey: AC72WfPu5ly3T7rXfRHrLA/l++BxbsNwe0qitgT9u6U=
            encrPublicKey: E9w4QejjJ6d+VODJlDKJcpI93RY3Bg4RQp4Rs1F9oQ8=
        schemaValidator:
          id: schemav2validator
          config:
            type: url
            location: https://raw.githubusercontent.com/beckn/protocol-specifications-v2/tags/core-2.0.0-rc-eos-release/api/beckn.yaml
            cacheTTL: "3600"
            extendedSchema_enabled: "true"
            extendedSchema_cacheTTL: "86400"
            extendedSchema_maxCacheSize: "100"
            extendedSchema_downloadTimeout: "30"
            extendedSchema_allowedDomains: "raw.githubusercontent.com,schemas.beckn.org"
            # P2P Energy Trading Profile: https://github.com/beckn/protocol-specifications-v2/tree/main/profiles/p2p-energy-trading/v0.3
            x-profile: "p2p-energy-trading/v0.3"
        cache:
          id: cache
          config:
            addr: redis:6379
        signValidator:
          id: signvalidator
        router:
          id: router
          config:
            routingConfig: ./config/local-p2p-routing-SellerBPPReceiver-from-BuyerBAP.yaml
        steps:
          - id: policyenforcer
            config:
              policyUrls: "https://raw.githubusercontent.com/beckn/DEG/refs/heads/main/specification/policies/p2p-trading-interdiscom.rego"
      steps:
        - validateSign
        - addRoute
        - validateSchema
        - policyenforcer

  - name: bppTxnCaller
    path: /bpp/caller/
    handler:
      type: std
      role: bpp
      httpClientConfig:
        maxIdleConns: 1000
        maxIdleConnsPerHost: 200
        idleConnTimeout: 300s
        responseHeaderTimeout: 5s
      plugins:
        registry:
          id: dediregistry
          config:
            url: https://api.dev.beckn.io/registry/dedi
            registryName: subscribers.beckn.one
            allowedParentNamespaces: "IES,IES-DISCOMS"
            timeout: 10
        keyManager:
          id: simplekeymanager
          config:
            networkParticipant: p2p-trading-sandbox2.com
            keyId: 76EU7Mvhh7jaEf7Lcac5R1PPeFL4ddr1ALs2QYzpyTRE8g15Yr1p7C
            signingPrivateKey: AC72WfPu5ly3T7rXfRHrLA/l++BxbsNwe0qitgT9u6U=
            signingPublicKey: E9w4QejjJ6d+VODJlDKJcpI93RY3Bg4RQp4Rs1F9oQ8=
            encrPrivateKey: AC72WfPu5ly3T7rXfRHrLA/l++BxbsNwe0qitgT9u6U=
            encrPublicKey: E9w4QejjJ6d+VODJlDKJcpI93RY3Bg4RQp4Rs1F9oQ8=
        schemaValidator:
          id: schemav2validator
          config:
            type: url
            location: https://raw.githubusercontent.com/beckn/protocol-specifications-v2/tags/core-2.0.0-rc-eos-release/api/beckn.yaml
            cacheTTL: "3600"
            extendedSchema_enabled: "true"
            extendedSchema_cacheTTL: "86400"
            extendedSchema_maxCacheSize: "100"
            extendedSchema_downloadTimeout: "30"
            extendedSchema_allowedDomains: "raw.githubusercontent.com,schemas.beckn.org"
            # P2P Energy Trading Profile: https://github.com/beckn/protocol-specifications-v2/tree/main/profiles/p2p-energy-trading/v0.3
            x-profile: "p2p-energy-trading/v0.3"            
        cache:
          id: cache
          config:
            addr: redis:6379
        router:
          id: router
          config:
            routingConfig: ./config/local-p2p-routing-SellerBPPCaller-to-BuyerBAP.yaml
        signer:
          id: signer
        middleware:
          - id: reqpreprocessor
            config:
              uuidKeys: transaction_id,message_id
              role: bpp          
        steps:
          - id: degledgerrecorder
            config:
              # Wave1 mode flags — explicit so behavior is visible in YAML, not
              # buried as code defaults. Wave1 keeps ledgerHost from config and
              # the legacy_ledger JSON shape; bit-identical to prior behavior.
              payloadShape: wave1
              ledgerUriSource: config
              ledgerApi: legacy_ledger
              # ledgerHost: "https://34.93.166.38.sslip.io" # OLD URL
              ledgerHost: "https://ies-p2p-energy-ledger.beckn.io"
              role: "SELLER"
              actions: "on_confirm,on_status"  # Handle both actions
              enabled: "true"
              asyncTimeout: "30000"
              # Signing config (same keys as simplekeymanager)
              signingPrivateKey: AC72WfPu5ly3T7rXfRHrLA/l++BxbsNwe0qitgT9u6U=
              networkParticipant: p2p-trading-sandbox2.com
              keyId: 76EU7Mvhh7jaEf7Lcac5R1PPeFL4ddr1ALs2QYzpyTRE8g15Yr1p7C
          - id: policyenforcer
            config:
              policyUrls: "https://raw.githubusercontent.com/beckn/DEG/refs/heads/main/specification/policies/p2p-trading-interdiscom.rego"
      steps:
        - addRoute
        - sign
        - validateSchema
        - degledgerrecorder
        - policyenforcer
  