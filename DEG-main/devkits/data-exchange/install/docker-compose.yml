# Data Exchange devkit stack.
#
# BAP-side and BPP-side services live on separate, mutually unreachable
# docker networks (bap_side, bpp_side). Each side has its own redis
# (aliased as `redis` inside its network). The beckn-router (Caddy) is the
# ONLY container with a foot in both networks; it accepts traffic on :9000
# and routes /bap/* and /bpp/* to the respective onix adapter on its own side.
#
# Effect: onix-bap cannot resolve or reach onix-bpp on the docker bridge.
# All BAP↔BPP traffic flows through the router on :9000. By default the
# Arazzo runner uses http://beckn-router:9000 in payload URIs (router
# bridges locally, no internet needed). To prove end-to-end public-internet
# traversal, expose the router via ngrok and run with PUBLIC_URL set to
# the tunnel URL.
#
# Run full stack:
#   docker compose up -d
# Run only BPP side:
#   docker compose up -d onix-bpp sandbox-bpp redis-bpp beckn-router
# Run only BAP side:
#   docker compose up -d onix-bap sandbox-bap redis-bap beckn-router
#
# Expose the router to the public internet: copy ngrok.yml.example to
# ngrok.yml, paste your authtoken, then:
#   ngrok start --all --config ngrok.yml
# Point workflows at the tunnel URL (forces real internet traversal):
#   PUBLIC_URL=https://<host>.ngrok-free.dev ./run-arazzo.sh
#   PUBLIC_URL=https://<host>.ngrok-free.dev ./run-arazzo.sh -w select-through-status -v

services:
  # ---------- BAP side ----------
  redis-bap:
    image: redis:alpine
    hostname: redis
    container_name: redis-bap
    networks:
      - bap_side
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  onix-bap:
    image: fidedocker/onix-adapter-deg:w-deg-plugins-v1
    container_name: onix-bap
    ports:
      - "8081:8081"
    environment:
      CONFIG_FILE: "/app/config/local-simple-bap.yaml"
      VAULT_ADDR: http://vault:8200
      VAULT_TOKEN: root
      REDIS_ADDR: redis:6379
      RABBITMQ_ADDR: rabbitmq:5672
      RABBITMQ_USER: admin
      RABBITMQ_PASS: admin123
    volumes:
      - ../config:/app/config
      - ../schemas:/app/schemas
    command: ["./server", "--config=/app/config/local-simple-bap.yaml"]
    networks:
      - bap_side

  sandbox-bap:
    image: fidedocker/sandbox-2.0:latest
    container_name: sandbox-bap
    environment:
      - NODE_ENV=production
      - PORT=3001
    ports:
      - "3001:3001"
    volumes:
      - ./sandbox-fixtures/nfh.global/testnet-deg:/app/dist/webhook/jsons/nfh.global/testnet-deg
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/api/health"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
    networks:
      - bap_side

  # ---------- BPP side ----------
  redis-bpp:
    image: redis:alpine
    hostname: redis
    container_name: redis-bpp
    networks:
      - bpp_side
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  onix-bpp:
    image: fidedocker/onix-adapter-deg:w-deg-plugins-v1
    container_name: onix-bpp
    ports:
      - "8082:8082"
    environment:
      CONFIG_FILE: "/app/config/local-simple-bpp.yaml"
      VAULT_ADDR: http://vault:8200
      VAULT_TOKEN: root
      REDIS_ADDR: redis:6379
      RABBITMQ_ADDR: rabbitmq:5672
      RABBITMQ_USER: admin
      RABBITMQ_PASS: admin123
    volumes:
      - ../config:/app/config
      - ../schemas:/app/schemas
    command: ["./server", "--config=/app/config/local-simple-bpp.yaml"]
    networks:
      - bpp_side

  sandbox-bpp:
    image: fidedocker/sandbox-2.0:latest
    container_name: sandbox-bpp
    environment:
      - NODE_ENV=production
      - PORT=3002
      - PERSONA=bpp
    ports:
      - "3002:3002"
    volumes:
    - ${RESPONSES_DIR:-./sandbox-fixtures/nfh.global/testnet-deg/response}:/app/dist/webhook/jsons/nfh.global/testnet-deg/response
    # - ${RESPONSES_DIR:-../uc1-meter-data/responses}:/app/dist/webhook/jsons/nfh.global/testnet-deg/response
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3002/api/health"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
    networks:
      - bpp_side

  # ---------- Path router (only container on both sides) ----------
  beckn-router:
    image: caddy:alpine
    container_name: beckn-router
    ports:
      - "9000:9000"
    networks:
      # Aliases so onix-bap/onix-bpp can resolve the BAP/BPP subscriber
      # hostnames the shared Arazzo runner rewrites payload bapUri/bppUri
      # to (see devkits/scripts/run-arazzo-lib.sh). The runner uses each
      # payload's context.bapId / bppId as the hostname, so these aliases
      # must match this devkit's subscriberIds (bap.example.com /
      # bpp.example.com — see uc*/examples/*.json). Caddy routes purely
      # on path (/bap/*, /bpp/*) so the host header is irrelevant.
      bap_side:
        aliases:
          - bap.example.com
          - bpp.example.com
      bpp_side:
        aliases:
          - bap.example.com
          - bpp.example.com
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile

networks:
  bap_side:
    driver: bridge
  bpp_side:
    driver: bridge
