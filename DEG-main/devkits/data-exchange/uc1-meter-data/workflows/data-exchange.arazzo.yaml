arazzo: 1.0.1
info:
  title: Energy Data Exchange — UC1 (AMI Meter Data)
  version: 2.0.0
  description: >
    Minimal Beckn 2.0 workflow for AMI meter data exchange using DatasetItem
    (INLINE or DOWNLOAD delivery). Covers the value-adding steps only:
    publish, discover, confirm, and data delivery via on_status.

    Run (from uc1-meter-data/workflows/):
      docker compose up -d          # in install/
      ./run-arazzo.sh               # publish → discover
      ./run-arazzo.sh -w confirm-through-delivery -v

    Override server URLs:
      -S beckn-bap-caller=http://localhost:8081/bap/caller \
      -S beckn-bpp-caller=http://localhost:8082/bpp/caller

sourceDescriptions:
  - name: beckn-bap-caller
    type: openapi
    url: https://raw.githubusercontent.com/beckn/protocol-specifications-v2/refs/tags/core-v2.0.0-lts/api/v2.0.0/beckn.yaml
    x-serverUrl: http://localhost:8081/bap/caller

  - name: beckn-bpp-caller
    type: openapi
    url: https://raw.githubusercontent.com/beckn/protocol-specifications-v2/refs/tags/core-v2.0.0-lts/api/v2.0.0/beckn.yaml
    x-serverUrl: http://localhost:8082/bpp/caller

workflows:
  - workflowId: publish-catalog
    summary: AMISP publishes AMI meter data catalog
    steps:
      - stepId: publish-catalog
        operationId: beckn-bpp-caller.catalogPublish
        requestBody:
          contentType: application/json
          payload:
            $ref: "../examples/publish-catalog.json"

  - workflowId: discover
    summary: Discom discovers available AMI meter datasets
    steps:
      - stepId: discover
        operationId: beckn-bap-caller.discover
        requestBody:
          contentType: application/json
          payload:
            $ref: "../examples/discover-request.json"

  - workflowId: confirm-through-delivery
    summary: Discom confirms contract and receives AMI meter data
    steps:
      - stepId: confirm
        description: BAP confirms contract with payment settlement
        operationId: beckn-bap-caller.confirm
        requestBody:
          contentType: application/json
          payload:
            $ref: "../examples/confirm-request.json"

      - stepId: on-confirm
        description: BPP acknowledges and begins dataset preparation
        operationId: beckn-bpp-caller.onConfirm
        requestBody:
          contentType: application/json
          payload:
            $ref: "../examples/on-confirm-response.json"

      - stepId: status
        description: BAP polls for delivery readiness
        operationId: beckn-bap-caller.status
        requestBody:
          contentType: application/json
          payload:
            $ref: "../examples/status-request.json"

      - stepId: on-status-ready-url
        description: BPP delivers data via signed download URL
        operationId: beckn-bpp-caller.onStatus
        requestBody:
          contentType: application/json
          payload:
            $ref: "../examples/on-status-response-ready-url.json"

      - stepId: on-status-ready-inline
        description: >
          Alternative: BPP delivers AMI data inline via dataPayload
          (IES MeterData v0.6 profile array — CustomerProfile + IntervalProfile
          per meter — embedded in on_status performanceAttributes).
        operationId: beckn-bpp-caller.onStatus
        requestBody:
          contentType: application/json
          payload:
            $ref: "../examples/on-status-response-ready-inline.json"

  - workflowId: paged-push-delivery
    summary: BPP proactively pushes AMI meter data in three paginated on_status messages
    description: >
      BPP-push pagination pattern. After confirm/on_confirm the BPP first signals
      PROCESSING, then pushes three consecutive on_status messages (pages 1–3) to
      the BAP without waiting for additional status polls. BAP accumulates
      dataPayload entries across pages and triggers downstream processing when
      pageInfo.isLast == true.
    steps:
      - stepId: confirm
        description: BAP confirms contract
        operationId: beckn-bap-caller.confirm
        requestBody:
          contentType: application/json
          payload:
            $ref: "../examples/confirm-request.json"

      - stepId: on-confirm
        description: BPP acknowledges contract
        operationId: beckn-bpp-caller.onConfirm
        requestBody:
          contentType: application/json
          payload:
            $ref: "../examples/on-confirm-response.json"

      - stepId: on-status-processing
        description: BPP signals data preparation is underway (PROCESSING state)
        operationId: beckn-bpp-caller.onStatus
        requestBody:
          contentType: application/json
          payload:
            $ref: "../examples/on-status-response-processing.json"

      - stepId: on-status-push-p1
        description: BPP pushes page 1 of 3 (~167 customers, sequence 0, isLast false)
        operationId: beckn-bpp-caller.onStatus
        requestBody:
          contentType: application/json
          payload:
            $ref: "../examples/on-status-response-paged-push-p1.json"

      - stepId: on-status-push-p2
        description: BPP pushes page 2 of 3 (~167 customers, sequence 1, isLast false)
        operationId: beckn-bpp-caller.onStatus
        requestBody:
          contentType: application/json
          payload:
            $ref: "../examples/on-status-response-paged-push-p2.json"

      - stepId: on-status-push-p3
        description: BPP pushes final page (~166 customers, sequence 2, isLast true) — BAP triggers downstream processing
        operationId: beckn-bpp-caller.onStatus
        requestBody:
          contentType: application/json
          payload:
            $ref: "../examples/on-status-response-paged-push-p3.json"

  - workflowId: paged-pull-delivery
    summary: BAP drives paginated data retrieval via cursor-based status polling
    description: >
      BAP-pull pagination pattern. BAP polls status after confirm/on_confirm.
      BPP first returns PROCESSING; on the next poll BAP includes a pageCursor
      tag to request a specific page. BPP responds with that page's data and a
      nextCursor pointing to the following page.
    steps:
      - stepId: confirm
        description: BAP confirms contract
        operationId: beckn-bap-caller.confirm
        requestBody:
          contentType: application/json
          payload:
            $ref: "../examples/confirm-request.json"

      - stepId: on-confirm
        description: BPP acknowledges contract
        operationId: beckn-bpp-caller.onConfirm
        requestBody:
          contentType: application/json
          payload:
            $ref: "../examples/on-confirm-response.json"

      - stepId: status
        description: BAP polls for delivery readiness (initial poll, no cursor)
        operationId: beckn-bap-caller.status
        requestBody:
          contentType: application/json
          payload:
            $ref: "../examples/status-request.json"

      - stepId: on-status-processing
        description: BPP signals data preparation is underway (PROCESSING state)
        operationId: beckn-bpp-caller.onStatus
        requestBody:
          contentType: application/json
          payload:
            $ref: "../examples/on-status-response-processing.json"

      - stepId: status-paged-pull
        description: BAP requests page 2 with pageCursor ami-meter-blr-zone-a-q1-p2
        operationId: beckn-bap-caller.status
        requestBody:
          contentType: application/json
          payload:
            $ref: "../examples/status-request-paged-pull.json"

      - stepId: on-status-paged-pull
        description: BPP delivers page 2 of 3 with nextCursor for page 3 (isLast false)
        operationId: beckn-bpp-caller.onStatus
        requestBody:
          contentType: application/json
          payload:
            $ref: "../examples/on-status-response-paged-pull.json"
