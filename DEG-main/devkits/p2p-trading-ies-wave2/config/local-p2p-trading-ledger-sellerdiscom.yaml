appName: "onix-ledger-sellerdiscom-local"
log:
  level: debug
  destinations:
    - type: stdout
  contextKeys:
    - transaction_id
    - message_id
    - subscriber_id
    - module_id
http:
  port: 8083
  timeout:
    read: 30
    write: 30
    idle: 30
pluginManager:
  root: ./plugins
modules:
  # /bpp/receiver — request actions (status) where the ledger plays BPP-receiver.
  # Beckn convention: status is a request → requester=BAP, responder=BPP.
  - name: bppTxnReceiver
    path: /bpp/receiver/
    handler:
      type: std
      role: bpp
      httpClientConfig:
        maxIdleConns: 1000
        maxIdleConnsPerHost: 200
        idleConnTimeout: 300s
        responseHeaderTimeout: 30s
      plugins:
        registry:
          id: dediregistry
          config:
            url: https://fabric.nfh.global/registry/dedi
            registryName: subscribers.beckn.one
            allowedNetworkIDs: "nfh.global/testnet-deg"
            timeout: 10
        keyManager:
          id: simplekeymanager
          config:
            networkParticipant: seller-discom-ledger.example.com
            keyId: 76EU95zHsfthaGGXbQwvLbobuwixkuRS9jF3WiN5uFpWjDGvHW2SYv
            signingPrivateKey: TTQMAEy0xJcoRXRNofZAwZq1c3VH6j98UUaHP7budQQ=
            signingPublicKey: g/3swjI93IhZ0SScrVZapeLjU+W0AeiSid3LViYZJFo=
            encrPrivateKey: TTQMAEy0xJcoRXRNofZAwZq1c3VH6j98UUaHP7budQQ=
            encrPublicKey: g/3swjI93IhZ0SScrVZapeLjU+W0AeiSid3LViYZJFo=
        schemaValidator:
          id: schemav2validator
          config:
            type: url
            location: https://raw.githubusercontent.com/beckn/protocol-specifications-v2/refs/tags/core-v2.0.0-lts/api/v2.0.0/beckn.yaml
            cacheTTL: "172800"
            extendedSchema_enabled: "true"
            extendedSchema_cacheTTL: "172800"
            extendedSchema_maxCacheSize: "100"
            extendedSchema_downloadTimeout: "30"
            extendedSchema_allowedDomains: "raw.githubusercontent.com,schema.beckn.io"
        cache:
          id: cache
          config:
            addr: redis-ledger:6379
        router:
          id: router
          config:
            routingConfig: ./config/local-p2p-trading-routing-LedgerSellerDiscom-Receiver.yaml
        middleware:
          - id: reqpreprocessor
            config:
              uuidKeys: transaction_id,message_id
              role: bpp
      steps:
        - addRoute
        - validateSchema

  # /bap/receiver — callback actions (on_confirm, on_status) where the ledger
  # plays BAP-receiver (Beckn convention: on_* callbacks land at the BAP-receiver).
  - name: bapTxnReceiver
    path: /bap/receiver/
    handler:
      type: std
      role: bpp
      httpClientConfig:
        maxIdleConns: 1000
        maxIdleConnsPerHost: 200
        idleConnTimeout: 300s
        responseHeaderTimeout: 30s
      plugins:
        registry:
          id: dediregistry
          config:
            url: https://fabric.nfh.global/registry/dedi
            registryName: subscribers.beckn.one
            allowedNetworkIDs: "nfh.global/testnet-deg"
            timeout: 10
        keyManager:
          id: simplekeymanager
          config:
            networkParticipant: seller-discom-ledger.example.com
            keyId: 76EU95zHsfthaGGXbQwvLbobuwixkuRS9jF3WiN5uFpWjDGvHW2SYv
            signingPrivateKey: TTQMAEy0xJcoRXRNofZAwZq1c3VH6j98UUaHP7budQQ=
            signingPublicKey: g/3swjI93IhZ0SScrVZapeLjU+W0AeiSid3LViYZJFo=
            encrPrivateKey: TTQMAEy0xJcoRXRNofZAwZq1c3VH6j98UUaHP7budQQ=
            encrPublicKey: g/3swjI93IhZ0SScrVZapeLjU+W0AeiSid3LViYZJFo=
        schemaValidator:
          id: schemav2validator
          config:
            type: url
            location: https://raw.githubusercontent.com/beckn/protocol-specifications-v2/refs/tags/core-v2.0.0-lts/api/v2.0.0/beckn.yaml
            cacheTTL: "172800"
            extendedSchema_enabled: "true"
            extendedSchema_cacheTTL: "172800"
            extendedSchema_maxCacheSize: "100"
            extendedSchema_downloadTimeout: "30"
            extendedSchema_allowedDomains: "raw.githubusercontent.com,schema.beckn.io"
        cache:
          id: cache
          config:
            addr: redis-ledger:6379
        router:
          id: router
          config:
            routingConfig: ./config/local-p2p-trading-routing-LedgerSellerDiscom-Receiver.yaml
        middleware:
          - id: reqpreprocessor
            config:
              uuidKeys: transaction_id,message_id
              role: bpp
      steps:
        - addRoute
        - validateSchema

  - name: bppTxnCaller
    path: /bpp/caller/
    handler:
      type: std
      role: bpp
      httpClientConfig:
        maxIdleConns: 1000
        maxIdleConnsPerHost: 200
        idleConnTimeout: 300s
        responseHeaderTimeout: 30s
      plugins:
        registry:
          id: dediregistry
          config:
            url: https://fabric.nfh.global/registry/dedi
            registryName: subscribers.beckn.one
            allowedNetworkIDs: "nfh.global/testnet-deg"
            timeout: 10
        keyManager:
          id: simplekeymanager
          config:
            networkParticipant: seller-discom-ledger.example.com
            keyId: 76EU95zHsfthaGGXbQwvLbobuwixkuRS9jF3WiN5uFpWjDGvHW2SYv
            signingPrivateKey: TTQMAEy0xJcoRXRNofZAwZq1c3VH6j98UUaHP7budQQ=
            signingPublicKey: g/3swjI93IhZ0SScrVZapeLjU+W0AeiSid3LViYZJFo=
            encrPrivateKey: TTQMAEy0xJcoRXRNofZAwZq1c3VH6j98UUaHP7budQQ=
            encrPublicKey: g/3swjI93IhZ0SScrVZapeLjU+W0AeiSid3LViYZJFo=
        schemaValidator:
          id: schemav2validator
          config:
            type: url
            location: https://raw.githubusercontent.com/beckn/protocol-specifications-v2/refs/tags/core-v2.0.0-lts/api/v2.0.0/beckn.yaml
            cacheTTL: "172800"
            extendedSchema_enabled: "true"
            extendedSchema_cacheTTL: "172800"
            extendedSchema_maxCacheSize: "100"
            extendedSchema_downloadTimeout: "30"
            extendedSchema_allowedDomains: "raw.githubusercontent.com,schema.beckn.io"
        cache:
          id: cache
          config:
            addr: redis-ledger:6379
        router:
          id: router
          config:
            routingConfig: ./config/local-p2p-trading-routing-LedgerSellerDiscom-Caller.yaml
        signer:
          id: signer
        middleware:
          - id: reqpreprocessor
            config:
              uuidKeys: transaction_id,message_id
              role: bpp
      steps:
        - validateSchema
        - addRoute
        - sign

  # /bap/caller — ledger acts as BAP, sending `status` meter-data requests
  # outbound to the sellerdiscom utility /bpp/receiver. targetType:bpp in the
  # routing config routes to context.bppUri (the discom's /bpp/receiver URL).
  - name: bapTxnCaller
    path: /bap/caller/
    handler:
      type: std
      role: bap
      httpClientConfig:
        maxIdleConns: 1000
        maxIdleConnsPerHost: 200
        idleConnTimeout: 300s
        responseHeaderTimeout: 30s
      plugins:
        registry:
          id: dediregistry
          config:
            url: https://fabric.nfh.global/registry/dedi
            registryName: subscribers.beckn.one
            allowedNetworkIDs: "nfh.global/testnet-deg"
            timeout: 10
        keyManager:
          id: simplekeymanager
          config:
            networkParticipant: seller-discom-ledger.example.com
            keyId: 76EU95zHsfthaGGXbQwvLbobuwixkuRS9jF3WiN5uFpWjDGvHW2SYv
            signingPrivateKey: TTQMAEy0xJcoRXRNofZAwZq1c3VH6j98UUaHP7budQQ=
            signingPublicKey: g/3swjI93IhZ0SScrVZapeLjU+W0AeiSid3LViYZJFo=
            encrPrivateKey: TTQMAEy0xJcoRXRNofZAwZq1c3VH6j98UUaHP7budQQ=
            encrPublicKey: g/3swjI93IhZ0SScrVZapeLjU+W0AeiSid3LViYZJFo=
        schemaValidator:
          id: schemav2validator
          config:
            type: url
            location: https://raw.githubusercontent.com/beckn/protocol-specifications-v2/refs/tags/core-v2.0.0-lts/api/v2.0.0/beckn.yaml
            cacheTTL: "172800"
            extendedSchema_enabled: "true"
            extendedSchema_cacheTTL: "172800"
            extendedSchema_maxCacheSize: "100"
            extendedSchema_downloadTimeout: "30"
            extendedSchema_allowedDomains: "raw.githubusercontent.com,schema.beckn.io"
        cache:
          id: cache
          config:
            addr: redis-ledger:6379
        router:
          id: router
          config:
            routingConfig: ./config/local-p2p-trading-routing-LedgerSellerDiscom-BapCaller.yaml
        signer:
          id: signer
        middleware:
          - id: reqpreprocessor
            config:
              uuidKeys: transaction_id,message_id
              role: bap
      steps:
        - validateSchema
        - addRoute
        - sign
