appName: "onix-sellerdiscom-local"
log:
  level: debug
  destinations:
    - type: stdout
  contextKeys:
    - transaction_id
    - message_id
    - subscriber_id
    - module_id
http:
  port: 8086
  timeout:
    read: 30
    write: 30
    idle: 30
pluginManager:
  root: ./plugins

# Sellerdiscom *actor* — the seller's distribution utility, distinct from
# the seller-discom-ledger TSP. Today discoms push meter actuals via the
# bespoke /ledger/allocate REST API on deg-ledgr-service; this onix instance
# is the Beckn-native replacement, emitting `on_status` with the same
# information packaged as a `DatasetItem` (data-exchange schema) whose
# `dataPayload` is a `BecknTimeSeries` of measured-value samples. The
# message lands at seller-discom-ledger /bap/receiver; the ledger reads
# `resourceAttributes.@type == DatasetItem`, allocates against the matching
# trade, and ACKs.
#
# Signing is intentionally off here — the receiver (seller-discom-ledger
# /bap/receiver) does not validate signatures in this devkit, and the actor's
# subscriber id (sellerdiscom.example.com) is not registered in the testnet
# dedi registry. For prod, register the subscriber and re-enable `signer`
# + `- sign` in the steps list below.
modules:
  # /bpp/receiver — receives `status` meter-data requests from the ledger.
  # Ack-only in this devkit: onix validates the request and returns ACK.
  # In production the discom would then fire on_status back with actuals.
  - name: bppTxnReceiver
    path: /bpp/receiver/
    handler:
      type: std
      role: bpp
      httpClientConfig:
        maxIdleConns: 1000
        maxIdleConnsPerHost: 200
        idleConnTimeout: 300s
        responseHeaderTimeout: 30s
      plugins:
        registry:
          id: dediregistry
          config:
            url: https://fabric.nfh.global/registry/dedi
            registryName: subscribers.beckn.one
            allowedNetworkIDs: "nfh.global/testnet-deg"
            timeout: 10
        keyManager:
          id: simplekeymanager
          config:
            networkParticipant: sellerdiscom.example.com
            keyId: 76EU93x8Ua4gzQPXFkc83ochbgvB8uTJJRAKaHqQpYYpzatTbMmULg
            signingPrivateKey: TTQMAEy0xJcoRXRNofZAwZq1c3VH6j98UUaHP7budQQ=
            signingPublicKey: g/3swjI93IhZ0SScrVZapeLjU+W0AeiSid3LViYZJFo=
            encrPrivateKey: TTQMAEy0xJcoRXRNofZAwZq1c3VH6j98UUaHP7budQQ=
            encrPublicKey: g/3swjI93IhZ0SScrVZapeLjU+W0AeiSid3LViYZJFo=
        schemaValidator:
          id: schemav2validator
          config:
            type: url
            location: https://raw.githubusercontent.com/beckn/protocol-specifications-v2/refs/tags/core-v2.0.0-lts/api/v2.0.0/beckn.yaml
            cacheTTL: "172800"
            extendedSchema_enabled: "true"
            extendedSchema_cacheTTL: "172800"
            extendedSchema_maxCacheSize: "100"
            extendedSchema_downloadTimeout: "30"
            extendedSchema_allowedDomains: "raw.githubusercontent.com,schema.beckn.io"
        cache:
          id: cache
          config:
            addr: redis-sellerdiscom:6379
        middleware:
          - id: reqpreprocessor
            config:
              uuidKeys: transaction_id,message_id
              role: bpp
      steps:
        - validateSchema

  - name: bppTxnCaller
    path: /bpp/caller/
    handler:
      type: std
      role: bpp
      httpClientConfig:
        maxIdleConns: 1000
        maxIdleConnsPerHost: 200
        idleConnTimeout: 300s
        responseHeaderTimeout: 30s
      plugins:
        registry:
          id: dediregistry
          config:
            url: https://fabric.nfh.global/registry/dedi
            registryName: subscribers.beckn.one
            allowedNetworkIDs: "indiaenergystack.in/test-ies-p2p-trading-network"
            timeout: 10
        keyManager:
          id: simplekeymanager
          config:
            networkParticipant: sellerdiscom.example.com
            keyId: 76EU93x8Ua4gzQPXFkc83ochbgvB8uTJJRAKaHqQpYYpzatTbMmULg
            signingPrivateKey: TTQMAEy0xJcoRXRNofZAwZq1c3VH6j98UUaHP7budQQ=
            signingPublicKey: g/3swjI93IhZ0SScrVZapeLjU+W0AeiSid3LViYZJFo=
            encrPrivateKey: TTQMAEy0xJcoRXRNofZAwZq1c3VH6j98UUaHP7budQQ=
            encrPublicKey: g/3swjI93IhZ0SScrVZapeLjU+W0AeiSid3LViYZJFo=
        schemaValidator:
          id: schemav2validator
          config:
            type: url
            location: https://raw.githubusercontent.com/beckn/protocol-specifications-v2/refs/tags/core-v2.0.0-lts/api/v2.0.0/beckn.yaml
            cacheTTL: "172800"
            extendedSchema_enabled: "true"
            extendedSchema_cacheTTL: "172800"
            extendedSchema_maxCacheSize: "100"
            extendedSchema_downloadTimeout: "30"
            extendedSchema_allowedDomains: "raw.githubusercontent.com,schema.beckn.io"
        cache:
          id: cache
          config:
            addr: redis-sellerdiscom:6379
        router:
          id: router
          config:
            routingConfig: ./config/local-p2p-trading-routing-SellerDiscomActor-Caller.yaml
        signer:
          id: signer
        middleware:
          - id: reqpreprocessor
            config:
              uuidKeys: transaction_id,message_id
              role: bpp
      steps:
        - validateSchema
        - addRoute
        - sign
