appName: "onix-local"
log:
  level: debug
  destinations:
    - type: stdout
  contextKeys:
    - transaction_id
    - message_id
    - subscriber_id
    - module_id
http:
  port: 8082
  timeout:
    read: 30
    write: 30
    idle: 30
pluginManager:
  root: ./plugins
modules:
  - name: bppTxnReceiver
    path: /bpp/receiver/
    handler:
      type: std
      role: bpp
      httpClientConfig:
        maxIdleConns: 1000
        maxIdleConnsPerHost: 200
        idleConnTimeout: 300s
        responseHeaderTimeout: 30s
      plugins:
        registry:
          id: dediregistry
          config:
            url: https://fabric.nfh.global/registry/dedi
            registryName: subscribers.beckn.one
            allowedNetworkIDs: "indiaenergystack.in/test-ies-p2p-trading-network"
            timeout: 10
        keyManager:
          id: simplekeymanager
          config:
            networkParticipant: sellerapp.example.com
            keyId: 76EU9BVtj4VYcQvBdpDr84T6AbiLe2PkBdJLaJRBUsZnFgD8joffqz
            signingPrivateKey: TTQMAEy0xJcoRXRNofZAwZq1c3VH6j98UUaHP7budQQ=
            signingPublicKey: g/3swjI93IhZ0SScrVZapeLjU+W0AeiSid3LViYZJFo=
            encrPrivateKey: TTQMAEy0xJcoRXRNofZAwZq1c3VH6j98UUaHP7budQQ=
            encrPublicKey: g/3swjI93IhZ0SScrVZapeLjU+W0AeiSid3LViYZJFo=
        schemaValidator:
          id: schemav2validator
          config:
            type: url
            location: https://raw.githubusercontent.com/beckn/protocol-specifications-v2/refs/tags/core-v2.0.0-lts/api/v2.0.0/beckn.yaml
            cacheTTL: "172800"
            extendedSchema_enabled: "true"
            extendedSchema_cacheTTL: "172800"
            extendedSchema_maxCacheSize: "100"
            extendedSchema_downloadTimeout: "30"
            extendedSchema_allowedDomains: "raw.githubusercontent.com,schema.beckn.io"
        checkPolicy:
          id: opapolicychecker
          config:
            networkPolicyConfig: ./config/opa-network-policies.yaml
            refreshInterval: "5m"
        cache:
          id: cache
          config:
            addr: redis:6379
        signValidator:
          id: signvalidator
        router:
          id: router
          config:
            routingConfig: ./config/local-p2p-trading-routing-SellerApp-BppReceiver.yaml
        middleware:
          - id: reqpreprocessor
            config:
              uuidKeys: transaction_id,message_id
              role: bpp
        steps:
          - id: degledgerrecorder
            config:
              # Rule 1: incoming /status → cascade /status to sellerDiscom.
              # (on_status now arrives at /bap/receiver per Beckn semantics.)
              payloadShape: wave2
              ledgerUriSource: payload
              ledgerApi: beckn
              role: SELLER
              actions: status
              enabled: "true"
              asyncTimeout: "30000"
              retryCount: "3"
              retryMaxTTL: "10m"
              retryBackoff: "5s"
              signingPrivateKey: TTQMAEy0xJcoRXRNofZAwZq1c3VH6j98UUaHP7budQQ=
              networkParticipant: sellerapp.example.com
              keyId: 76EU9BVtj4VYcQvBdpDr84T6AbiLe2PkBdJLaJRBUsZnFgD8joffqz
      steps:
        - validateSign
        - checkPolicy
        - addRoute
        - validateSchema
        - degledgerrecorder

  # /bap/receiver — seller acts as BAP towards sellerDiscom. Receives /on_status
  # from sellerDiscom (own discom) and forwards to buyer; also receives /on_status
  # from buyer-peer (reverse cascade) and forwards to sellerDiscom. Rule 2.
  - name: bapTxnReceiver
    path: /bap/receiver/
    handler:
      type: std
      role: bap
      httpClientConfig:
        maxIdleConns: 1000
        maxIdleConnsPerHost: 200
        idleConnTimeout: 300s
        responseHeaderTimeout: 30s
      plugins:
        registry:
          id: dediregistry
          config:
            url: https://fabric.nfh.global/registry/dedi
            registryName: subscribers.beckn.one
            allowedNetworkIDs: "indiaenergystack.in/test-ies-p2p-trading-network"
            timeout: 10
        keyManager:
          id: simplekeymanager
          config:
            networkParticipant: sellerapp.example.com
            keyId: 76EU9BVtj4VYcQvBdpDr84T6AbiLe2PkBdJLaJRBUsZnFgD8joffqz
            signingPrivateKey: TTQMAEy0xJcoRXRNofZAwZq1c3VH6j98UUaHP7budQQ=
            signingPublicKey: g/3swjI93IhZ0SScrVZapeLjU+W0AeiSid3LViYZJFo=
            encrPrivateKey: TTQMAEy0xJcoRXRNofZAwZq1c3VH6j98UUaHP7budQQ=
            encrPublicKey: g/3swjI93IhZ0SScrVZapeLjU+W0AeiSid3LViYZJFo=
        schemaValidator:
          id: schemav2validator
          config:
            type: url
            location: https://raw.githubusercontent.com/beckn/protocol-specifications-v2/refs/tags/core-v2.0.0-lts/api/v2.0.0/beckn.yaml
            cacheTTL: "172800"
            extendedSchema_enabled: "true"
            extendedSchema_cacheTTL: "172800"
            extendedSchema_maxCacheSize: "100"
            extendedSchema_downloadTimeout: "30"
            extendedSchema_allowedDomains: "raw.githubusercontent.com,schema.beckn.io"
        checkPolicy:
          id: opapolicychecker
          config:
            networkPolicyConfig: ./config/opa-network-policies.yaml
            refreshInterval: "5m"
        cache:
          id: cache
          config:
            addr: redis:6379
        signValidator:
          id: signvalidator
        router:
          id: router
          config:
            routingConfig: ./config/local-p2p-trading-routing-SellerApp-BapReceiver.yaml
        middleware:
          - id: reqpreprocessor
            config:
              uuidKeys: transaction_id,message_id
              role: bap
        steps:
          - id: degledgerrecorder
            config:
              # Rule 2 (sender-aware): if context.bppId == own discom participantId
              # (sellerDiscom), forward /on_status to peer's /bap/receiver.
              # Otherwise cascade to own discom.
              payloadShape: wave2
              ledgerUriSource: payload
              ledgerApi: beckn
              role: SELLER
              actions: on_status
              enabled: "true"
              asyncTimeout: "30000"
              retryCount: "3"
              retryMaxTTL: "10m"
              retryBackoff: "5s"
              signingPrivateKey: TTQMAEy0xJcoRXRNofZAwZq1c3VH6j98UUaHP7budQQ=
              networkParticipant: sellerapp.example.com
              keyId: 76EU9BVtj4VYcQvBdpDr84T6AbiLe2PkBdJLaJRBUsZnFgD8joffqz
      steps:
        - validateSign
        - checkPolicy
        - addRoute
        - validateSchema
        - degledgerrecorder

  - name: bppTxnCaller
    path: /bpp/caller/
    handler:
      type: std
      role: bpp
      httpClientConfig:
        maxIdleConns: 1000
        maxIdleConnsPerHost: 200
        idleConnTimeout: 300s
        responseHeaderTimeout: 30s
      plugins:
        registry:
          id: dediregistry
          config:
            url: https://fabric.nfh.global/registry/dedi
            registryName: subscribers.beckn.one
            allowedNetworkIDs: "indiaenergystack.in/test-ies-p2p-trading-network"
            timeout: 10
        keyManager:
          id: simplekeymanager
          config:
            networkParticipant: sellerapp.example.com
            keyId: 76EU9BVtj4VYcQvBdpDr84T6AbiLe2PkBdJLaJRBUsZnFgD8joffqz
            signingPrivateKey: TTQMAEy0xJcoRXRNofZAwZq1c3VH6j98UUaHP7budQQ=
            signingPublicKey: g/3swjI93IhZ0SScrVZapeLjU+W0AeiSid3LViYZJFo=
            encrPrivateKey: TTQMAEy0xJcoRXRNofZAwZq1c3VH6j98UUaHP7budQQ=
            encrPublicKey: g/3swjI93IhZ0SScrVZapeLjU+W0AeiSid3LViYZJFo=
        schemaValidator:
          id: schemav2validator
          config:
            type: url
            location: https://raw.githubusercontent.com/beckn/protocol-specifications-v2/refs/tags/core-v2.0.0-lts/api/v2.0.0/beckn.yaml
            cacheTTL: "172800"
            extendedSchema_enabled: "true"
            extendedSchema_cacheTTL: "172800"
            extendedSchema_maxCacheSize: "100"
            extendedSchema_downloadTimeout: "30"
            extendedSchema_allowedDomains: "raw.githubusercontent.com,schema.beckn.io"
        checkPolicy:
          id: opapolicychecker
          config:
            networkPolicyConfig: ./config/opa-network-policies.yaml
            refreshInterval: "5m"
        cache:
          id: cache
          config:
            addr: redis:6379
        router:
          id: router
          config:
            routingConfig: ./config/local-p2p-trading-routing-SellerApp-BppCaller.yaml
        signer:
          id: signer
        middleware:
          - id: reqpreprocessor
            config:
              uuidKeys: transaction_id,message_id
              role: bpp
          - id: revenueflows
            config:
              actions: "on_status"
              cacheTTL: "172800"
              debugLogging: "true"
              allowedDomains: "raw.githubusercontent.com"
              outputPath: "message.contract.consideration[id=auto-revenue-flows].considerationAttributes"
              outputMode: "jsonld"
              outputType: "RevenueFlow"
              outputContextURL: "https://raw.githubusercontent.com/beckn/DEG/refs/heads/main/specification/schema/RevenueFlow/v2.0/context.jsonld"
              outputArrayKey: "revenueFlows"
              entryDefaults: '{"status":{"code":"SETTLED"}}'
        steps:
          - id: degledgerrecorder
            config:
              # Wave2: on_confirm → write commitment to sellerDiscom ledger.
              payloadShape: wave2
              ledgerUriSource: payload
              ledgerApi: beckn
              role: SELLER
              actions: on_confirm
              enabled: "true"
              asyncTimeout: "30000"
              retryCount: "3"
              retryMaxTTL: "10m"
              retryBackoff: "5s"
              signingPrivateKey: TTQMAEy0xJcoRXRNofZAwZq1c3VH6j98UUaHP7budQQ=
              networkParticipant: sellerapp.example.com
              keyId: 76EU9BVtj4VYcQvBdpDr84T6AbiLe2PkBdJLaJRBUsZnFgD8joffqz
      steps:
        - validateSchema
        - checkPolicy
        - addRoute
        - sign
        - degledgerrecorder

  # /bap/caller — sellerapp acts as BAP-caller when initiating a sub-tx
  # (seller-initiated status: asking buyer about buyer-discom allocation, or
  # asking own seller-discom-ledger about settlement). Mirrors buyerapp's
  # /bap/caller module on port 8082.
  - name: bapTxnCaller
    path: /bap/caller/
    handler:
      type: std
      role: bap
      httpClientConfig:
        maxIdleConns: 1000
        maxIdleConnsPerHost: 200
        idleConnTimeout: 300s
        responseHeaderTimeout: 30s
      plugins:
        registry:
          id: dediregistry
          config:
            url: https://fabric.nfh.global/registry/dedi
            registryName: subscribers.beckn.one
            allowedNetworkIDs: "indiaenergystack.in/test-ies-p2p-trading-network"
            timeout: 10
        keyManager:
          id: simplekeymanager
          config:
            networkParticipant: sellerapp.example.com
            keyId: 76EU9BVtj4VYcQvBdpDr84T6AbiLe2PkBdJLaJRBUsZnFgD8joffqz
            signingPrivateKey: TTQMAEy0xJcoRXRNofZAwZq1c3VH6j98UUaHP7budQQ=
            signingPublicKey: g/3swjI93IhZ0SScrVZapeLjU+W0AeiSid3LViYZJFo=
            encrPrivateKey: TTQMAEy0xJcoRXRNofZAwZq1c3VH6j98UUaHP7budQQ=
            encrPublicKey: g/3swjI93IhZ0SScrVZapeLjU+W0AeiSid3LViYZJFo=
        schemaValidator:
          id: schemav2validator
          config:
            type: url
            location: https://raw.githubusercontent.com/beckn/protocol-specifications-v2/refs/tags/core-v2.0.0-lts/api/v2.0.0/beckn.yaml
            cacheTTL: "172800"
            extendedSchema_enabled: "true"
            extendedSchema_cacheTTL: "172800"
            extendedSchema_maxCacheSize: "100"
            extendedSchema_downloadTimeout: "30"
            extendedSchema_allowedDomains: "raw.githubusercontent.com,schema.beckn.io"
        checkPolicy:
          id: opapolicychecker
          config:
            networkPolicyConfig: ./config/opa-network-policies.yaml
            refreshInterval: "5m"
        cache:
          id: cache
          config:
            addr: redis:6379
        router:
          id: router
          config:
            routingConfig: ./config/local-p2p-trading-routing-SellerApp-BapCaller.yaml
        signer:
          id: signer
        middleware:
          - id: reqpreprocessor
            config:
              uuidKeys: transaction_id,message_id
              role: bap
      steps:
        - validateSchema
        - checkPolicy
        - addRoute
        - sign
