# BuyerDiscom Ledger Receiver routing: incoming status → sandbox-ledger-buyerdiscom
routingRules:
  - version: "2.0.0"
    targetType: "url"
    target:
      url: "http://sandbox-ledger-buyerdiscom:3004/api/webhook"
    endpoints:
      - status

  - version: "2.0.0"
    targetType: "url"
    target:
      url: "http://sandbox-ledger-buyerdiscom:3004/api/bap-webhook"
    endpoints:
      - on_confirm
      - on_status
