openapi: 3.1.1
info:
  title: P2PTrade
  version: '2.0'
  description: 'JSON Schema for Peer-to-Peer energy trading contracts on the DEG network. P2PTrade is
    a subclass of EnergyContract (which is itself a subclass of beckn:Contract) and represents the current
    recommended schema for P2P energy trading agreements between prosumers.

    P2PTrade supersedes the deprecated EnergyContract schema. It inherits all Contract properties and
    is associated with the EnergyTrade domain schema which defines the full set of P2P-specific attributes
    (offer, order, delivery, resource, customer, orderItem).'
components:
  schemas:
    P2PTrade:
      type: object
      additionalProperties: false
      x-tags:
      - energy-trade
      - p2p-trading
      - contract
      - energy
      x-jsonld:
        '@context': ./context.jsonld
        '@type': P2PTrade
      allOf:
      - $ref: https://schema.beckn.io/EnergyContract/v2.0
