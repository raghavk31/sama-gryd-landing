openapi: 3.1.1
info:
  title: EnergyMeterDataCredential
  version: 1.0.0
  description: >
    Verifiable Credential containing historical time-series interval meter
    readings using ESPI/Green Button types (ReadingType, IntervalBlock,
    IntervalReading). Subclass of EnergyCredential. The credential subject
    combines a customer profile with meter data within a W3C VC 2.0 envelope.
jsonSchemaDialect: https://json-schema.org/draft/2020-12/schema
servers:
  - url: https://schema.beckn.io
    description: Canonical schema registry
paths: {}
components:
  schemas:
    EnergyMeterDataCredential:
      $id: https://schema.beckn.io/EnergyMeterDataCredential/v1.0
      title: EnergyMeterDataCredential
      description: >
        Verifiable Credential containing historical time-series interval meter
        readings using ESPI/Green Button types (ReadingType, IntervalBlock,
        IntervalReading). Subclass of EnergyCredential. The credential subject
        combines a customer profile with meter data within a W3C VC 2.0 envelope.
      x-tags:
        - energy
        - credential
        - verifiable-credential
        - metering
        - green-button
        - espi
      type: object
      additionalProperties: true
      allOf:
        - $ref: "https://schema.beckn.io/EnergyCredential/v2.0"
      x-jsonld:
        "@context": ./context.jsonld
        "@type": EnergyMeterDataCredential
      properties:
        credentialSubject:
          description: >
            The credential subject containing customer identity and historical
            time-series meter reading data for a single meter.
          x-jsonld:
            "@id": deg:credentialSubject
          type: object
          required:
            - customerProfile
            - meterDataGB
          properties:
            id:
              type: string
              format: uri
              description: DID of the customer/credential subject.
              x-jsonld:
                "@id": "@id"
            customerProfile:
              $ref: "../../EnergyCustomerProfile/v1.0/attributes.yaml#/components/schemas/EnergyCustomerProfile"
              description: Shared customer identity linking a utility account to a physical meter.
              x-jsonld:
                "@id": deg:customerProfile
            meterDataGB:
              $ref: "../../EnergyMeterDataGBCredential/v1.0/attributes.yaml#/components/schemas/EnergyMeterDataGBCredential"
              description: ESPI/Green Button meter reading data for the meter.
              x-jsonld:
                "@id": deg:meterDataGB
